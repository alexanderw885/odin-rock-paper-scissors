<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rock Paper Scissors</title>
    <link rel="stylesheet" href="style.css">
    <script type="module" src="script.js"></script>
</head>
<body>
    <div class="final-results">Rock Paper Scissors</div>

    <div class="scores">
        <div class="counter">
            <h1>Player score</h1>
            <p class="human score">0</p>
        </div>
        <div class="counter">
            <h1>Computer score</h1>
            <p class="computer score">0</p>
        </div>
    </div>

    <div class="buttons-row">
        <button class="rock button">Rock</button>
        <button class="paper button">Paper</button>
        <button class="scissors button">Scissors</button>
    </div>

    <div class="restart"><button>Restart</button></div>

    <div class="results"></div>
    
</body>
</html>
